[package]
name = "auth-rs"
version = "0.1.0"
edition = "2024"

[features]
default = []
axum = ["dep:axum"]
sqlx = ["dep:sqlx"]

[dependencies]
axum = { version = "0.8", optional = true }
chrono = "0.4.44"
email_address = "0.2.9"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150" }
sqlx = { version="0.9.0", features = ["runtime-tokio", "postgres", "chrono"], optional = true }
